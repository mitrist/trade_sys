<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тикеры на день</title>
</head>
<body>
    <h1>Тикеры на день</h1>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    {% if success %}<p style="color:green;">{{ success }}</p>{% endif %}
    <form method="post" action="">
        {% csrf_token %}
        <p>
            <label>Дата (YYYY-MM-DD): <input type="date" name="date" value="{{ date|default:'' }}" required></label>
        </p>
        <p>
            <label>Символы (через запятую): <input type="text" name="symbols" value="{{ symbols|default:'' }}" placeholder="BTCUSDT, ETHUSDT"></label>
        </p>
        <p><button type="submit">Сохранить</button></p>
    </form>
    <p><a href="{% url 'market:volume_history' %}">История объёма по тикеру</a> · <a href="{% url 'market:charts' %}">Графики (TradingView)</a> · <a href="{% url 'admin:index' %}">Админка</a></p>
</body>
</html>
